# =============================================================================
# 🌪️ MITANDRINA - Docker Compose
# Orchestration complète: PostgreSQL + PostGIS, Redis, FastAPI AI, Node Gateway
# =============================================================================

services:
  # ==========================================================================
  # PostgreSQL + PostGIS
  # ==========================================================================
  postgres:
    image: postgis/postgis:15-3.4
    container_name: mitandrina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mitandrina
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mitandrina"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mitandrina-network

  # ==========================================================================
  # Redis (Cache + Queue + Pub/Sub)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: mitandrina-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mitandrina-network

  # ==========================================================================
  # FastAPI AI Services
  # ==========================================================================
  ai-service:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    container_name: mitandrina-ai
    restart: unless-stopped
    environment:
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "8000"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/mitandrina"
      DATABASE_URL_SYNC: "postgresql://postgres:postgres@postgres:5432/mitandrina"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_QUEUE_URL: "redis://redis:6379/1"
      # Clés API (à remplacer via .env ou secrets)
      OPENWEATHER_API_KEY: "${OPENWEATHER_API_KEY:-}"
      NASA_FIRMS_API_KEY: "${NASA_FIRMS_API_KEY:-}"
      JWT_SECRET: "${JWT_SECRET:-mitandrina-secret-key}"
    volumes:
      - ai_models:/app/models
      - osm_cache:/app/cache/osm
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mitandrina-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # Node.js API Gateway + WebSocket
  # ==========================================================================
  gateway:
    build:
      context: ./backend-gateway
      dockerfile: Dockerfile
    container_name: mitandrina-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      PORT: "3001"
      LOG_LEVEL: "info"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
      PGHOST: "postgres"
      PGPORT: "5432"
      PGDATABASE: "mitandrina"
      PGUSER: "postgres"
      PGPASSWORD: "postgres"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      JWT_SECRET: "${JWT_SECRET:-mitandrina-secret-key}"
      JWT_EXPIRES: "7d"
      AI_SERVICE_URL: "http://ai-service:8000"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      TWILIO_PHONE_NUMBER: "${TWILIO_PHONE_NUMBER:-}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-}"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY:-}"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - mitandrina-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Frontend Next.js (Optionnel - peut être déployé sur Vercel)
  # ==========================================================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: mitandrina-frontend
  #   restart: unless-stopped
  #   environment:
  #     NEXT_PUBLIC_API_URL: "http://localhost:3001/api/v1"
  #     NEXT_PUBLIC_WS_URL: "ws://localhost:3001"
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - gateway
  #   networks:
  #     - mitandrina-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_models:
    driver: local
  osm_cache:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  mitandrina-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
